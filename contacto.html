<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contacto — ArtBizarre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f3;
      --text: #111111;
      --text-muted: #777777;
      --border: rgba(0,0,0,0.12);
      --red: #B51904;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* NAV */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      border-bottom: 0.5px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 3px;
      color: var(--text);
    }
    .logo span { color: var(--red); }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }
    .nav-links a {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    .btn-outline {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 8px 16px;
      border: 0.5px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .btn-outline:hover, .btn-outline.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    /* HERO */
    .hero {
      min-height: 40vh;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 5rem 2rem;
      text-align: center;
    }

    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(60px, 10vw, 120px);
      line-height: 1;
      letter-spacing: 3px;
      margin-bottom: 1.5rem;
    }

    .hero-line {
      width: 60px;
      height: 2px;
      background: var(--red);
      margin: 0 auto;
    }

    /* CONTACT SECTION */
    .contact-section {
      padding: 5rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: start;
    }

    .contact-block {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .block-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 2px;
      margin-bottom: 1rem;
      color: var(--text);
      border-bottom: 0.5px solid var(--border);
      padding-bottom: 1rem;
    }

    .social-links {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .social-item {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      text-decoration: none;
      color: var(--text);
      transition: all 0.3s;
      padding: 1rem;
      border: 0.5px solid var(--border);
      border-radius: 2px;
    }
    .social-item:hover {
      border-color: var(--red);
      background: var(--bg-secondary);
    }

    .social-icon {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .social-text {
      display: flex;
      flex-direction: column;
    }
    .social-text .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
    }
    .social-text .handle {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .email-block {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .email-item {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      text-decoration: none;
      color: var(--text);
      transition: all 0.3s;
      padding: 1.5rem;
      border: 0.5px solid var(--border);
      border-radius: 2px;
    }
    .email-item:hover {
      border-color: var(--red);
      background: var(--bg-secondary);
    }

    .email-icon {
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .email-text {
      display: flex;
      flex-direction: column;
    }
    .email-text .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .email-text .address {
      font-size: 16px;
      font-weight: 500;
      color: var(--red);
      word-break: break-all;
    }

    /* FOOTER */
    footer {
      padding: 2rem;
      border-top: 0.5px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 5rem;
    }
    .footer-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 3px;
    }
    .footer-copy { font-size: 12px; color: var(--text-muted); letter-spacing: 1px; }
    .footer-links { display: flex; gap: 1.5rem; }
    .footer-links a {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
    }
    .footer-links a:hover { color: var(--text); }

    @media (max-width: 768px) {
      .contact-grid {
        grid-template-columns: 1fr;
        gap: 2rem;
      }
      footer {
        flex-direction: column;
        gap: 1.5rem;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">Art<span>B</span>izarre</div>
    <ul class="nav-links">
      <li><a href="./artbizarre_landing (n).html">Arte</a></li>
      <li><a href="./artbizarre_landing (n).html">Ropa</a></li>

                <path d="M11 21C10 19.5 8 19 6 20C4 21 3 23 3 25C3 28 5 30 7 30C9 30 10.5 28.5 11 27" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  </section>

  <footer>
    <div class="footer-logo">Art<span style="color:var(--red)">B</span>izarre</div>
    <div class="footer-copy">© 2026 ArtBizarre — Arte urbano y vestimenta</div>
    <div class="footer-links">
      <a href="#">IG</a>

</body>
</html>
